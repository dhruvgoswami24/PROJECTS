<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Algo Terminal</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { 
            background-color: #0b0e14; /* Deep Hacker Dark */
            color: #d1d4dc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        h1 { 
            text-align: center; 
            color: #2962ff; 
            border-bottom: 1px solid #2b2b43; 
            padding: 15px 0; 
            margin: 0;
            background-color: #131722;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }
        /* LEFT PANEL: CHART */
        .left-panel {
            flex: 2;
            background: #131722;
            border-radius: 8px;
            border: 1px solid #2b2b43;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }
        .panel-title {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 600;
        }
       #tvchart {
            flex: 1;
            width: 100%;
            min-height: 400px; /* Ye chart ko ek fixed jagah dega */
            position: relative;
        }

        /* RIGHT PANEL: LOGS */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .log-section {
            background: #131722;
            border-radius: 8px;
            border: 1px solid #2b2b43;
            padding: 15px;
        }
        .log-item {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.5;
            background: #1e222d;
            border-left: 4px solid #8b949e;
        }
        /* Status Colors */
        .waiting { border-left-color: #8b949e; color: #8b949e; }
        .entry { border-left-color: #2962ff; color: #58a6ff; font-weight: bold; }
        .holding { border-left-color: #e6a23c; color: #e6a23c; font-weight: bold; }
        .exit-profit { border-left-color: #00c853; color: #00c853; font-weight: bold; }
        .exit-loss { border-left-color: #ff5252; color: #ff5252; font-weight: bold; }
        
        .symbol-badge {
            background: #2b2b43;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <h1>⚡ ALGO TRADING TERMINAL ⚡</h1>

    <div class="container">
        <div class="left-panel">
            <div class="panel-title">📈 BTCUSDT Live Tracker</div>
            <div id="tvchart"></div>
        </div>

        <div class="right-panel">
            <div class="log-section">
                <div class="panel-title">🎯 Active Trades & Alerts</div>
                <div id="active-log">No active trades right now...</div>
            </div>

            <div class="log-section" style="opacity: 0.7;">
                <div class="panel-title">⏳ Scanning Market...</div>
                <div id="waiting-log">Loading...</div>
            </div>
        </div>
    </div>

   <script>
        // --- 1. SETUP TRADING VIEW CHART ---
        const chartContainer = document.getElementById('tvchart');
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: { 
                background: { type: 'solid', color: '#131722' }, 
                textColor: '#d1d4dc' 
            },
            grid: { 
                vertLines: { color: '#2b2b43' }, 
                horzLines: { color: '#2b2b43' } 
            },
            timeScale: { timeVisible: true, secondsVisible: true }
        });

        // NAYA COMMAND: addAreaSeries ki jagah addSeries use karenge (New Version Fix)
        const areaSeries = chart.addSeries(LightweightCharts.AreaSeries, {
            lineColor: '#2962ff',
            topColor: 'rgba(41, 98, 255, 0.28)',
            bottomColor: 'rgba(41, 98, 255, 0.05)',
            lineWidth: 2,
        });

        // Resize handler
        window.addEventListener('resize', () => {
            chart.applyOptions({ 
                width: chartContainer.clientWidth, 
                height: chartContainer.clientHeight 
            });
        });


        // --- 2. FETCH DATA FROM JAVA BACKEND ---
        let lastTimestamp = 0;

        async function fetchStatus() {
            try {
                const response = await fetch('http://localhost:7070/api/status');
                const data = await response.json();

                let activeHtml = '';
                let waitingHtml = '';

                for (const symbol in data) {
                    let text = data[symbol];
                    let logEntry = `<div class="log-item {COLOR}"><span class="symbol-badge">${symbol}</span> ${text}</div>`;

                    if (text.includes("WAITING")) {
                        waitingHtml += logEntry.replace("{COLOR}", "waiting");
                    } else if (text.includes("ENTRY") || text.includes("HOLDING")) {
                        activeHtml += logEntry.replace("{COLOR}", text.includes("ENTRY") ? "entry" : "holding");
                    } else if (text.includes("TARGET") || text.includes("Saved")) {
                        activeHtml += logEntry.replace("{COLOR}", "exit-profit");
                    } else if (text.includes("STOPLOSS")) {
                        activeHtml += logEntry.replace("{COLOR}", "exit-loss");
                    }

                    if (symbol === 'BTCUSDT') {
                        // Updated Regex to catch all status formats
                        let priceMatch = text.match(/(?:Price:|Current:|BUY at|Entry:)\s*(\d+\.?\d*)/);
                        if (priceMatch && priceMatch[1]) {
                            let currentPrice = parseFloat(priceMatch[1]);
                            let now = Math.floor(Date.now() / 1000);
                            
                            if (now > lastTimestamp) {
                                areaSeries.update({ time: now, value: currentPrice });
                                lastTimestamp = now;
                            }
                        }
                    }
                }

                document.getElementById('active-log').innerHTML = activeHtml || "No active trades...";
                document.getElementById('waiting-log').innerHTML = waitingHtml || "Scanning...";

            } catch (error) {
                console.error("Backend Error: ", error);
            }
        }

        setInterval(fetchStatus, 1500);
        fetchStatus();
    </script>
</body>
</html>
